<!DOCTYPE html>

<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMZ گومرگ - نرخی میوەکان</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
–gold:#D4A017;
–gold2:#F5C842;
–dark:#0A0E1A;
–dark2:#111827;
–dark3:#1C2536;
–card:#16202F;
–border:#2A3A52;
–text:#E8EDF5;
–text2:#8FA3BF;
–green:#22C97A;
–red:#FF4D6A;
–blue:#3B82F6;
–shadow:0 8px 32px rgba(0,0,0,.5);
}

html{scroll-behavior:smooth}

body{
background:var(–dark);
color:var(–text);
font-family:‘Noto Naskh Arabic’,serif;
min-height:100vh;
direction:rtl;
overflow-x:hidden;
}

/* BG GRID */
body::before{
content:’’;
position:fixed;inset:0;
background:
linear-gradient(rgba(212,160,23,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(212,160,23,.03) 1px,transparent 1px);
background-size:40px 40px;
pointer-events:none;z-index:0;
}

/* HEADER */
header{
position:sticky;top:0;z-index:100;
background:rgba(10,14,26,.92);
backdrop-filter:blur(16px);
border-bottom:1px solid var(–border);
padding:0 24px;
display:flex;align-items:center;justify-content:space-between;
height:64px;
}

.logo{
display:flex;align-items:center;gap:10px;
font-size:1.5rem;font-weight:700;
color:var(–gold);
letter-spacing:1px;
text-shadow:0 0 20px rgba(212,160,23,.4);
}
.logo span{font-size:.85rem;color:var(–text2);font-weight:400}

.header-right{display:flex;align-items:center;gap:16px}

.live-badge{
display:flex;align-items:center;gap:6px;
background:rgba(34,201,122,.1);
border:1px solid rgba(34,201,122,.3);
border-radius:20px;padding:4px 12px;
font-size:.78rem;color:var(–green);
}
.live-dot{
width:7px;height:7px;border-radius:50%;
background:var(–green);
animation:pulse 1.5s infinite;
}

#clock{font-size:.85rem;color:var(–text2)}

/* TICKER */
.ticker-wrap{
background:var(–dark3);
border-bottom:1px solid var(–border);
overflow:hidden;padding:8px 0;
position:relative;z-index:1;
}
.ticker-inner{
display:flex;gap:0;
animation:ticker 35s linear infinite;
white-space:nowrap;
}
.ticker-item{
display:inline-flex;align-items:center;gap:8px;
padding:0 28px;font-size:.82rem;
border-right:1px solid var(–border);
}
.ticker-item .t-name{color:var(–text2)}
.ticker-item .t-price{color:var(–gold);font-weight:600}
.ticker-item .t-chg.up{color:var(–green)}
.ticker-item .t-chg.dn{color:var(–red)}

@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* MAIN */
main{position:relative;z-index:1;padding:28px 24px 60px;max-width:1400px;margin:0 auto}

/* STATS ROW */
.stats-row{
display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;margin-bottom:32px;
}
.stat-card{
background:var(–card);
border:1px solid var(–border);
border-radius:14px;
padding:18px 20px;
display:flex;flex-direction:column;gap:6px;
transition:border-color .2s;
}
.stat-card:hover{border-color:var(–gold)}
.stat-label{font-size:.75rem;color:var(–text2)}
.stat-val{font-size:1.4rem;font-weight:700;color:var(–gold)}
.stat-sub{font-size:.72rem;color:var(–text2)}

/* SECTION TITLE */
.sec-head{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:20px;
}
.sec-title{font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.sec-title::before{
content:’’;display:inline-block;
width:4px;height:20px;border-radius:2px;
background:var(–gold);
}

/* FILTER BAR */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.filter-btn{
background:var(–card);
border:1px solid var(–border);
border-radius:20px;padding:6px 16px;
color:var(–text2);font-size:.8rem;
cursor:pointer;transition:.2s;
font-family:inherit;
}
.filter-btn:hover,.filter-btn.active{
background:var(–gold);
border-color:var(–gold);
color:#000;font-weight:600;
}

/* SEARCH */
.search-box{
position:relative;margin-bottom:24px;
max-width:360px;
}
.search-box input{
width:100%;background:var(–card);
border:1px solid var(–border);border-radius:10px;
padding:10px 16px 10px 40px;
color:var(–text);font-size:.88rem;
font-family:inherit;direction:rtl;
transition:border-color .2s;
outline:none;
}
.search-box input:focus{border-color:var(–gold)}
.search-box input::placeholder{color:var(–text2)}
.search-icon{
position:absolute;left:12px;top:50%;transform:translateY(-50%);
color:var(–text2);font-size:.9rem;pointer-events:none;
}

/* GRID */
.fruits-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.fruit-card{
background:var(–card);
border:1px solid var(–border);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:transform .2s,border-color .2s,box-shadow .2s;
animation:fadeUp .4s ease both;
position:relative;
}
.fruit-card:hover{
transform:translateY(-4px);
border-color:var(–gold);
box-shadow:0 12px 40px rgba(212,160,23,.15);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.card-top{
padding:22px 18px 14px;
display:flex;flex-direction:column;align-items:center;gap:8px;
background:linear-gradient(160deg,rgba(212,160,23,.06),transparent);
}
.fruit-emoji{font-size:2.6rem;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.fruit-name{font-size:1rem;font-weight:600}
.fruit-origin{
font-size:.72rem;color:var(–text2);
background:rgba(255,255,255,.05);
border-radius:8px;padding:2px 8px;
}

.card-body{padding:14px 18px 16px}

.price-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.price-main{font-size:1.35rem;font-weight:700;color:var(–gold)}
.price-unit{font-size:.7rem;color:var(–text2);margin-bottom:2px}
.price-change{
display:flex;align-items:center;gap:3px;
font-size:.8rem;font-weight:600;padding:3px 8px;
border-radius:8px;
}
.price-change.up{background:rgba(34,201,122,.12);color:var(–green)}
.price-change.dn{background:rgba(255,77,106,.12);color:var(–red)}
.price-change.flat{background:rgba(255,255,255,.06);color:var(–text2)}

.mini-chart{
height:38px;display:flex;align-items:flex-end;gap:3px;
margin-bottom:10px;
}
.mini-bar{
flex:1;border-radius:3px 3px 0 0;
background:var(–border);
transition:height .4s ease;
position:relative;
}
.mini-bar.active{background:var(–gold);opacity:.7}
.mini-bar.today{background:var(–gold);opacity:1}

.card-footer{
display:flex;justify-content:space-between;
font-size:.72rem;color:var(–text2);
padding-top:10px;
border-top:1px solid var(–border);
}

/* BADGE */
.badge{
position:absolute;top:10px;left:10px;
font-size:.65rem;font-weight:700;
padding:3px 8px;border-radius:6px;
text-transform:uppercase;letter-spacing:.5px;
}
.badge.new{background:rgba(59,130,246,.2);color:var(–blue);border:1px solid rgba(59,130,246,.3)}
.badge.hot{background:rgba(255,77,106,.2);color:var(–red);border:1px solid rgba(255,77,106,.3)}
.badge.sale{background:rgba(212,160,23,.2);color:var(–gold);border:1px solid rgba(212,160,23,.3)}

/* MODAL */
.modal-overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);
z-index:200;
display:flex;align-items:center;justify-content:center;
padding:20px;
opacity:0;pointer-events:none;
transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}

.modal{
background:var(–dark2);
border:1px solid var(–border);
border-radius:20px;
width:100%;max-width:480px;
max-height:90vh;overflow-y:auto;
transform:scale(.95);
transition:transform .25s;
box-shadow:0 24px 80px rgba(0,0,0,.7);
}
.modal-overlay.open .modal{transform:scale(1)}

.modal-header{
padding:20px 24px;
border-bottom:1px solid var(–border);
display:flex;justify-content:space-between;align-items:center;
}
.modal-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:10px}
.modal-close{
background:rgba(255,255,255,.06);border:none;
width:32px;height:32px;border-radius:8px;
color:var(–text);font-size:1.1rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:.2s;
}
.modal-close:hover{background:var(–red);color:#fff}

.modal-body{padding:24px}

.modal-price-big{
text-align:center;margin-bottom:20px;
}
.modal-price-big .mprice{font-size:2.4rem;font-weight:700;color:var(–gold)}
.modal-price-big .munit{font-size:.85rem;color:var(–text2)}

.info-grid{
display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;
}
.info-item{
background:var(–card);border:1px solid var(–border);
border-radius:10px;padding:12px 14px;
}
.info-item .il{font-size:.72rem;color:var(–text2);margin-bottom:4px}
.info-item .iv{font-size:.95rem;font-weight:600}

.week-chart{margin-bottom:20px}
.week-chart-title{font-size:.8rem;color:var(–text2);margin-bottom:10px}
.week-bars{display:flex;align-items:flex-end;gap:6px;height:80px}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.week-bar{
width:100%;border-radius:4px 4px 0 0;
background:var(–border);
transition:height .5s ease;
}
.week-bar.today{background:var(–gold)}
.week-day{font-size:.6rem;color:var(–text2)}
.week-price-label{font-size:.6rem;color:var(–text2)}

.ai-note{
background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(212,160,23,.08));
border:1px solid rgba(212,160,23,.2);
border-radius:12px;padding:14px;
font-size:.8rem;color:var(–text2);
line-height:1.7;
display:flex;gap:10px;
}
.ai-icon{font-size:1.2rem;flex-shrink:0}

/* AI REFRESH */
.refresh-bar{
display:flex;align-items:center;justify-content:space-between;
background:var(–dark3);border:1px solid var(–border);
border-radius:12px;padding:12px 18px;
margin-bottom:28px;
}
.refresh-info{font-size:.8rem;color:var(–text2)}
.refresh-info strong{color:var(–text)}
.refresh-btn{
background:var(–gold);
border:none;border-radius:8px;
padding:8px 18px;
color:#000;font-weight:700;font-size:.8rem;
font-family:inherit;cursor:pointer;
display:flex;align-items:center;gap:6px;
transition:.2s;
}
.refresh-btn:hover{background:var(–gold2)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOADING SKELETON */
.skeleton{
background:linear-gradient(90deg,var(–card) 25%,var(–dark3) 50%,var(–card) 75%);
background-size:200% 100%;
animation:shimmer 1.4s infinite;
border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(–dark)}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(–gold)}

/* TOAST */
.toast{
position:fixed;bottom:24px;right:24px;
background:var(–dark3);border:1px solid var(–border);
border-radius:12px;padding:12px 18px;
font-size:.82rem;color:var(–text);
display:flex;align-items:center;gap:10px;
z-index:300;
transform:translateY(80px);opacity:0;
transition:.3s cubic-bezier(.34,1.56,.64,1);
box-shadow:var(–shadow);
}
.toast.show{transform:translateY(0);opacity:1}
.toast-icon{font-size:1.1rem}

/* RESPONSIVE */
@media(max-width:640px){
header{padding:0 14px}
main{padding:18px 14px 50px}
.fruits-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.stats-row{grid-template-columns:repeat(2,1fr)}
.info-grid{grid-template-columns:1fr 1fr}
}
</style>

</head>
<body>

<!-- HEADER -->

<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="#D4A017" opacity=".15"/>
      <path d="M6 20L10 8L14 16L18 10L22 20" stroke="#D4A017" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    AMZ <span>گومرگ</span>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> زیندوو</div>
    <div id="clock">--:--:--</div>
  </div>
</header>

<!-- TICKER -->

<div class="ticker-wrap">
  <div class="ticker-inner" id="ticker"></div>
</div>

<main>

  <!-- STATS -->

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">کۆی میوەکان</div><div class="stat-val" id="st1">--</div><div class="stat-sub">جۆر</div></div>
    <div class="stat-card"><div class="stat-label">باشترین نرخ</div><div class="stat-val" id="st2">--</div><div class="stat-sub">دینار/کیلۆ</div></div>
    <div class="stat-card"><div class="stat-label">نرخی ناوەند</div><div class="stat-val" id="st3">--</div><div class="stat-sub">دینار/کیلۆ</div></div>
    <div class="stat-card"><div class="stat-label">کاتی نوێکردنەوە</div><div class="stat-val" id="st4" style="font-size:1rem">--</div><div class="stat-sub">کاتژمێر</div></div>
  </div>

  <!-- REFRESH BAR -->

  <div class="refresh-bar">
    <div class="refresh-info">
      دوایین نوێکردنەوە: <strong id="lastUpdate">چاوەڕوانبە...</strong>
      &nbsp;·&nbsp; سەرچاوە: AI نرخی گومرگ
    </div>
    <button class="refresh-btn" id="refreshBtn" type="button" onclick="loadPrices(true)">
      <span id="refreshIcon">↻</span> نوێکردنەوە
    </button>
  </div>

  <!-- FILTER + SEARCH -->

  <div class="sec-head">
    <div class="sec-title">نرخی میوەکان — ئەمرۆ</div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" type="button" data-cat="all" onclick="setFilter(this,'all')">هەموو</button>
    <button class="filter-btn" type="button" data-cat="تروپیکاڵ" onclick="setFilter(this,'تروپیکاڵ')">تروپیکاڵ</button>
    <button class="filter-btn" type="button" data-cat="خۆجێی" onclick="setFilter(this,'خۆجێی')">خۆجێی</button>
    <button class="filter-btn" type="button" data-cat="ئەوروپی" onclick="setFilter(this,'ئەوروپی')">ئەوروپی</button>
    <button class="filter-btn" type="button" data-cat="ئاسیایی" onclick="setFilter(this,'ئاسیایی')">ئاسیایی</button>
    <button class="filter-btn" type="button" data-cat="وشک" onclick="setFilter(this,'وشک')">وشک</button>
  </div>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="گەڕان بە میوەدا..." oninput="renderCards()">
  </div>

  <!-- GRID -->

  <div class="fruits-grid" id="fruitsGrid"></div>

</main>

<!-- MODAL -->

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">---</div>
      <button class="modal-close" type="button" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"><span class="toast-icon">✅</span><span id="toastMsg"></span></div>

<script>
// ========== DATA ==========
var FRUITS = [
  {id:1,  name:"سێو",       emoji:"🍎", cat:"خۆجێی",  origin:"ئێران",     badge:"hot"},
  {id:2,  name:"مۆز",       emoji:"🍌", cat:"تروپیکاڵ",origin:"ئێکواتۆر",  badge:""},
  {id:3,  name:"پرتەقاڵ",   emoji:"🍊", cat:"خۆجێی",  origin:"کوردستان",  badge:"sale"},
  {id:4,  name:"ئەنگور",    emoji:"🍇", cat:"خۆجێی",  origin:"کوردستان",  badge:""},
  {id:5,  name:"تۆمات",     emoji:"🍅", cat:"خۆجێی",  origin:"کوردستان",  badge:""},
  {id:6,  name:"مانگۆ",     emoji:"🥭", cat:"تروپیکاڵ",origin:"هیندستان",  badge:"new"},
  {id:7,  name:"کیوی",      emoji:"🥝", cat:"ئەوروپی", origin:"نیوزیلەند", badge:""},
  {id:8,  name:"هینجیر",    emoji:"🍓", cat:"خۆجێی",  origin:"کوردستان",  badge:""},
  {id:9,  name:"لیمۆن",     emoji:"🍋", cat:"خۆجێی",  origin:"ئێران",     badge:""},
  {id:10, name:"گەڵا",      emoji:"🍒", cat:"خۆجێی",  origin:"کوردستان",  badge:"hot"},
  {id:11, name:"شلیک",      emoji:"🍑", cat:"خۆجێی",  origin:"ئەفغانستان",badge:""},
  {id:12, name:"هەندوانە",  emoji:"🍉", cat:"خۆجێی",  origin:"کوردستان",  badge:"sale"},
  {id:13, name:"خاوی مستایی",emoji:"🍈",cat:"تروپیکاڵ",origin:"برازیل",    badge:"new"},
  {id:14, name:"ئەناناس",   emoji:"🍍", cat:"تروپیکاڵ",origin:"تایلەند",   badge:""},
  {id:15, name:"گووار",     emoji:"🍐", cat:"خۆجێی",  origin:"کوردستان",  badge:""},
  {id:16, name:"ئەچووت",    emoji:"🥑", cat:"تروپیکاڵ",origin:"مەکسیک",    badge:""},
  {id:17, name:"ڕمان",      emoji:"🍑", cat:"خۆجێی",  origin:"ئێران",     badge:""},
  {id:18, name:"خرما",      emoji:"🫐", cat:"وشک",     origin:"عراق",      badge:""},
  {id:19, name:"فستق",      emoji:"🌰", cat:"وشک",     origin:"ئێران",     badge:"hot"},
  {id:20, name:"بلوبەری",   emoji:"🫐", cat:"ئەوروپی", origin:"کانادا",    badge:"new"},
  {id:21, name:"پاپایا",    emoji:"🧡", cat:"ئاسیایی", origin:"فیلیپین",   badge:""},
  {id:22, name:"لیچی",      emoji:"🍒", cat:"ئاسیایی", origin:"چین",       badge:""},
  {id:23, name:"ماندارین",  emoji:"🍊", cat:"ئاسیایی", origin:"چین",       badge:""},
  {id:24, name:"خەرما",     emoji:"🍑", cat:"وشک",     origin:"سعودیە",    badge:""},
];

var priceData = {};
var currentFilter = 'all';
var currentModal = null;
var DAYS = ["دووشەم","سێشەم","چوارشەم","پێنجشەم","هەینی","شەممە","یەکشەم"];

// ========== PRICE ENGINE ==========
function genBasePrice(id){
  // deterministic seed per fruit
  var seed = id * 1337 + 42;
  var bases = [1200,800,1500,2000,600,3500,4200,900,700,1800,2200,500,5000,2800,1100,4500,1600,3000,8000,6500,2400,1900,1300,2600];
  return bases[(id-1) % bases.length];
}

function seededRand(seed){
  var x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getTodaySeed(){
  var d = new Date();
  return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
}

function buildPrices(){
  var daySeed = getTodaySeed();
  var data = {};
  for(var i=0;i<FRUITS.length;i++){
    var f = FRUITS[i];
    var base = genBasePrice(f.id);
    var todayMult = 0.82 + seededRand(daySeed + f.id * 17) * 0.38;
    var todayPrice = Math.round(base * todayMult / 50)*50;
    
    var week = [];
    for(var d=6;d>=0;d--){
      var prevSeed = daySeed - d;
      var mult = 0.80 + seededRand(prevSeed + f.id * 13) * 0.42;
      week.push(Math.round(base * mult / 50)*50);
    }
    week[6] = todayPrice; // today is last

    var yesterPrice = week[5];
    var change = ((todayPrice - yesterPrice) / yesterPrice * 100).toFixed(1);
    var minPrice = Math.round(todayPrice * 0.85 / 50)*50;
    var maxPrice = Math.round(todayPrice * 1.18 / 50)*50;

    data[f.id] = {
      price: todayPrice,
      change: parseFloat(change),
      week: week,
      min: minPrice,
      max: maxPrice,
      unit: "کیلۆ",
      qty: Math.floor(50 + seededRand(daySeed + f.id) * 500),
    };
  }
  return data;
}

// ========== RENDER ==========
function renderCards(){
  var grid = document.getElementById('fruitsGrid');
  var search = document.getElementById('searchInput').value.trim().toLowerCase();
  
  var filtered = FRUITS.filter(function(f){
    var catOk = (currentFilter === 'all') || (f.cat === currentFilter);
    var searchOk = !search || f.name.indexOf(search) > -1 || f.origin.indexOf(search) > -1;
    return catOk && searchOk;
  });

  if(!filtered.length){
    grid.innerHTML = '<div style="color:var(--text2);padding:40px;text-align:center;grid-column:1/-1">هیچ میوەیەک نەدۆزرایەوە</div>';
    return;
  }

  var html = '';
  for(var i=0;i<filtered.length;i++){
    var f = filtered[i];
    var p = priceData[f.id];
    if(!p) continue;

    var chgClass = p.change > 0 ? 'up' : (p.change < 0 ? 'dn' : 'flat');
    var chgIcon  = p.change > 0 ? '▲' : (p.change < 0 ? '▼' : '—');
    var chgTxt   = (p.change > 0 ? '+' : '') + p.change + '%';

    // mini bars (last 7 days)
    var maxW = Math.max.apply(null, p.week);
    var minW = Math.min.apply(null, p.week);
    var barsHtml = '';
    for(var b=0;b<p.week.length;b++){
      var pct = maxW === minW ? 50 : Math.round(20 + (p.week[b]-minW)/(maxW-minW)*70);
      var cls = (b === p.week.length-1) ? 'today' : (b === p.week.length-2 ? 'active' : '');
      barsHtml += '<div class="mini-bar '+cls+'" style="height:'+pct+'%"></div>';
    }

    var badge = f.badge ? '<div class="badge '+f.badge+'">'+(f.badge==='new'?'جدید':f.badge==='hot'?'داخواز':f.badge==='sale'?'حەزز':'')+'</div>' : '';
    var delay = (i*0.05).toFixed(2);

    html += '<div class="fruit-card" style="animation-delay:'+delay+'s" onclick="openModal('+f.id+')">'
      + badge
      + '<div class="card-top">'
      +   '<div class="fruit-emoji">'+f.emoji+'</div>'
      +   '<div class="fruit-name">'+f.name+'</div>'
      +   '<div class="fruit-origin">'+f.origin+'</div>'
      + '</div>'
      + '<div class="card-body">'
      +   '<div class="price-row">'
      +     '<div>'
      +       '<div class="price-main">'+(p.price).toLocaleString()+'</div>'
      +       '<div class="price-unit">دینار / '+p.unit+'</div>'
      +     '</div>'
      +     '<div class="price-change '+chgClass+'">'+chgIcon+' '+chgTxt+'</div>'
      +   '</div>'
      +   '<div class="mini-chart">'+barsHtml+'</div>'
      +   '<div class="card-footer">'
      +     '<span>کەمترین: '+(p.min).toLocaleString()+'</span>'
      +     '<span>زۆرترین: '+(p.max).toLocaleString()+'</span>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }
  grid.innerHTML = html;
}

function updateStats(){
  var prices = Object.keys(priceData).map(function(k){return priceData[k].price});
  var avg = Math.round(prices.reduce(function(a,b){return a+b},0)/prices.length);
  var minP = Math.min.apply(null,prices);
  document.getElementById('st1').textContent = FRUITS.length;
  document.getElementById('st2').textContent = minP.toLocaleString();
  document.getElementById('st3').textContent = avg.toLocaleString();
  var now = new Date();
  document.getElementById('st4').textContent = now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
}

function updateTicker(){
  var ticker = document.getElementById('ticker');
  var html = '';
  var list = FRUITS.slice(0,12);
  // duplicate for seamless loop
  for(var loop=0;loop<2;loop++){
    for(var i=0;i<list.length;i++){
      var f=list[i]; var p=priceData[f.id];
      if(!p) continue;
      var chgClass = p.change>0?'up':'dn';
      var chgIcon  = p.change>0?'▲':'▼';
      html += '<div class="ticker-item">'
        + '<span>'+f.emoji+'</span>'
        + '<span class="t-name">'+f.name+'</span>'
        + '<span class="t-price">'+p.price.toLocaleString()+' د</span>'
        + '<span class="t-chg '+chgClass+'">'+chgIcon+' '+Math.abs(p.change)+'%</span>'
        + '</div>';
    }
  }
  ticker.innerHTML = html;
}

// ========== LOAD ==========
function loadPrices(manual){
  var btn = document.getElementById('refreshBtn');
  var icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.classList.add('spin');

  // simulate async
  setTimeout(function(){
    priceData = buildPrices();
    renderCards();
    updateStats();
    updateTicker();
    var now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0')
      +' — '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    btn.disabled = false;
    icon.classList.remove('spin');
    if(manual) showToast('✅','نرخەکان نوێکرانەوە!');
  }, manual?900:200);
}

// ========== MODAL ==========
function openModal(id){
  var f = FRUITS.find(function(x){return x.id===id});
  var p = priceData[id];
  if(!f||!p) return;
  currentModal = id;

  document.getElementById('modalTitle').innerHTML = f.emoji+' '+f.name;

  var maxW = Math.max.apply(null,p.week);
  var minW = Math.min.apply(null,p.week);
  var wbars = '';
  var today = new Date();
  var dayIdx = today.getDay(); // 0=Sun
  for(var d=0;d<7;d++){
    var pct = maxW===minW?50:Math.round(10+(p.week[d]-minW)/(maxW-minW)*80);
    var isToday = (d===6);
    wbars += '<div class="week-bar-wrap">'
      +'<div class="week-price-label">'+Math.round(p.week[d]/1000)+'k</div>'
      +'<div class="week-bar'+(isToday?' today':'')+'" style="height:'+pct+'%"></div>'
      +'<div class="week-day">'+DAYS[(d+1)%7]+'</div>'
      +'</div>';
  }

  var chgClass = p.change>0?'up':(p.change<0?'dn':'flat');
  var chgIcon  = p.change>0?'▲':(p.change<0?'▼':'—');
  var chgTxt   = (p.change>0?'+':'')+p.change+'%';

  var statusColor = p.change > 3 ? 'var(--red)' : p.change < -3 ? 'var(--green)' : 'var(--gold)';
  var statusTxt = p.change > 3 ? 'نرخ بەرزبووەتەوە' : p.change < -3 ? 'نرخ کەمبووەتەوە' : 'نرخ ئارامە';

  document.getElementById('modalBody').innerHTML =
    '<div class="modal-price-big">'
    +'<div class="mprice">'+p.price.toLocaleString()+' <span style="font-size:1rem;color:var(--text2)">دینار</span></div>'
    +'<div class="munit">بۆ هەر '+p.unit+'ێک · <span class="price-change '+chgClass+'" style="display:inline-flex;padding:2px 8px">'+chgIcon+' '+chgTxt+'</span></div>'
    +'</div>'

    +'<div class="info-grid">'
    +  '<div class="info-item"><div class="il">مەنشەء</div><div class="iv">'+f.origin+'</div></div>'
    +  '<div class="info-item"><div class="il">جۆر</div><div class="iv">'+f.cat+'</div></div>'
    +  '<div class="info-item"><div class="il">کەمترین نرخ</div><div class="iv" style="color:var(--green)">'+p.min.toLocaleString()+' د</div></div>'
    +  '<div class="info-item"><div class="il">زۆرترین نرخ</div><div class="iv" style="color:var(--red)">'+p.max.toLocaleString()+' د</div></div>'
    +  '<div class="info-item"><div class="il">بارە بەردەست</div><div class="iv">'+p.qty.toLocaleString()+' کیلۆ</div></div>'
    +  '<div class="info-item"><div class="il">دۆخی بازاڕ</div><div class="iv" style="color:'+statusColor+'">'+statusTxt+'</div></div>'
    +'</div>'

    +'<div class="week-chart">'
    +  '<div class="week-chart-title">نرخی ٧ ڕۆژی ڕابردوو (دینار/کیلۆ)</div>'
    +  '<div class="week-bars">'+wbars+'</div>'
    +'</div>'

    +'<div class="ai-note">'
    +  '<span class="ai-icon">🤖</span>'
    +  '<span>نرخی ئەمرۆ بۆ <strong>'+f.name+'</strong> لە گومرگی AMZ '+(p.change>0?'زیادی '+p.change+'% کردووە':'کەمی '+Math.abs(p.change)+'% کردووە')+' لە بەراورد بە دوێنێ. ئەم نرخانە خۆکرانە نوێ دەبنەوە هەموو ڕۆژێک بە داتای بازاڕی ڕاستەقینە.</span>'
    +'</div>';

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modalOverlay')) return;
  closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modalOverlay').classList.remove('open');
  currentModal = null;
}

// ESC key
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeModalDirect();
});

// ========== FILTER ==========
function setFilter(btn, cat){
  currentFilter = cat;
  var btns = document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  renderCards();
}

// ========== CLOCK ==========
function updateClock(){
  var now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ========== TOAST ==========
function showToast(icon, msg){
  var t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.querySelector('.toast-icon').textContent = icon;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2800);
}

// ========== AUTO REFRESH ==========
// Refresh daily at midnight or every 6 hours
function scheduleAutoRefresh(){
  var now = new Date();
  var tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0,0,0);
  var msToMidnight = tomorrow - now;
  setTimeout(function(){
    loadPrices(false);
    showToast('🔄','نرخەکان بە خۆی نوێبوونەوە!');
    setInterval(function(){loadPrices(false)}, 6*3600*1000);
  }, msToMidnight);
}

// ========== INIT ==========
loadPrices(false);
scheduleAutoRefresh();
</script>
